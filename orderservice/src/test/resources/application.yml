spring:
  application:
    name: order-service

  app:
    tenant-header: X-Tenant-ID

  datasource:
    url: jdbc:postgresql://localhost:5433/orders-microservice
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
      # ddl-auto: update
      default_schema: dbo
      format_sql: true

    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  springdoc:
    api:
      docs:
        path: /api-docs
        swagger-ui:
          path: /swagger-ui.html

  redis:
    host: localhost
    port: 6379
    timeout: 60000
    password: admin

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin

server:
  port: 8084


