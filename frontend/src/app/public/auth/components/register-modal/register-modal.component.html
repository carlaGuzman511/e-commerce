<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-container">
    <div class="modal-header">
      <h2 class="modal-title">Register user</h2>
      <button
        type="button"
        class="close-button"
        (click)="onCancel()"
        [disabled]="isSubmitting"
        aria-label="Close">
        ×
      </button>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="modal-body">
        <div class="form-group">
          <input
            type="text"
            id="username"
            formControlName="username"
            class="form-control"
            [class.error]="hasError('username', 'required') || hasError('username', 'minlength')"
            placeholder="User name">

          <div class="error-message" *ngIf="hasError('username', 'required')">
            User name is required.
          </div>
          <div class="error-message" *ngIf="hasError('username', 'minlength')">
            User name must be at least 3 characters long
          </div>
        </div>

        <div class="form-group">
          <input
            type="email"
            id="email"
            formControlName="email"
            class="form-control"
            [class.error]="hasError('email', 'required') || hasError('email', 'email')"
            placeholder="Email address">

          <div class="error-message" *ngIf="hasError('email', 'required')">
            Email is required
          </div>
          <div class="error-message" *ngIf="hasError('email', 'email')">
            Invalid email
          </div>
        </div>

        <div class="form-group">
          <input
            type="password"
            id="password"
            formControlName="password"
            class="form-control"
            [class.error]="hasError('password', 'required') || hasError('password', 'minlength')"
            placeholder="Password">

          <div class="error-message" *ngIf="hasError('password', 'required')">
            Password is required
          </div>
          <div class="error-message" *ngIf="hasError('password', 'minlength')">
            The password must be at least 8 characters long
          </div>
        </div>

        <div class="form-group">
          <input
            type="password"
            id="confirmPassword"
            formControlName="confirmPassword"
            class="form-control"
            [class.error]="hasError('confirmPassword', 'required') || passwordMismatch"
            placeholder="Confirm password">

          <div class="error-message" *ngIf="hasError('confirmPassword', 'required')">
            Confirm password
          </div>
          <div class="error-message" *ngIf="passwordMismatch">
            Passwords do not match
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="button button-cancel"
          (click)="onCancel()"
          [disabled]="isSubmitting">
          Cancel
        </button>
        <button
          type="submit"
          class="button button-save"
          [disabled]="isSubmitting">
          {{ isSubmitting ? 'Saving...' : 'Save' }}
        </button>
      </div>
    </form>
  </div>
</div>
