 <div class="form-field" [class]="className" [ngClass]="{'has-error': error, 'is-disabled': disabled}">
  <label class="form-label" *ngIf="label" [for]="name">
    {{ label }} 
    <span class="required" *ngIf="required">*</span>
  </label>

  <input
        type="date"
        [id]="name"
        [name]="name"
        [required]="required"
        [disabled]="disabled"
        [class]="'form-input ' + (error ? 'error' : '')"
        [class.valid]="!error && value"
        [value]="value"
        (input)="handleInput($event)"
        (blur)="handleBlur()"
    />      
  <div class="error-message" *ngIf="error" role="alert">{{ error }}</div>
  <div class="helper-text" *ngIf="helperText && !error">{{ helperText }}</div>
</div>
