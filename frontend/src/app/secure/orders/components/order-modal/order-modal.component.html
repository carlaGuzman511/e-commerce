<div class="modal-backdrop" (click)="backdropClick($event)">
  <div
    class="modal-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
    tabindex="-1"
    #dialog
  >
    <header class="modal-header">
      <h3 id="modalTitle">{{ title }}</h3>
      <button class="close-btn" (click)="onFormCancel()" aria-label="Close">×</button>
    </header>

    <section class="modal-body">
      <app-order-form
        [orderData]="initialData"
        [formTitle]="title"
        [isReadOnly]="isReadOnly"
        submitLabel="Save"
        (formSubmit)="onFormSubmit($event)"
        (formCancel)="onFormCancel()">
      </app-order-form>
    </section>
  </div>
</div>
