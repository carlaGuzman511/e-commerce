server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;

  location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

  location /product {
    proxy_pass http://host.docker.internal:8080;
  }

  location /media {
    proxy_pass http://host.docker.internal:8080;
  }

  location /auth {
    proxy_pass http://host.docker.internal:8080;
  }

  location /stores {
    proxy_pass http://host.docker.internal:8080;
  }

  location /order {
    proxy_pass http://host.docker.internal:8080;
  }
}
