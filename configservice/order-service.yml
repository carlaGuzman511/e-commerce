spring:
  config:
    import: classpath:application.yml
  datasource:
    url: jdbc:postgresql://${ORDER_DB_HOST}:${ORDER_DB_PORT}/${ORDER_DB_NAME}
    username: ${ORDER_DB_USER}
    password: ${ORDER_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: update
      default_schema: dbo
      show-sql: true
  
  services:
    products:
      base-url: http://localhost:8087/api/v1/products
    
    users:
      base-url: http://localhost:8081/api/v1/users
      
    tenants:
      base-url: http://localhost:8082/api/v1/tenants

  sql:
    init:
      mode: always
      encoding: UTF-8
      
server:
 port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/