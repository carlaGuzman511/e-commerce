spring:
  config:
    import: classpath:application.yml
  datasource:
    url: jdbc:postgresql://${PRODUCT_DB_HOST}:${PRODUCT_DB_PORT}/${PRODUCT_DB_NAME}
    username: ${PRODUCT_DB_USER}
    password: ${PRODUCT_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: update
      default_schema: dbo
      show-sql: true
  sql:
    init:
      mode: always
      encoding: UTF-8

server:
 port: 8087

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
services:
  tenants:
    base-url: http://localhost:8082/api/v1
  media:
    url: http://localhost:8088

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: FULL

logging:
  level:
    root: INFO
    com.kiosko: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss} %-5level [%thread] %logger{36} - %X{tenantId} %msg%n"