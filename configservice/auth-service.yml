spring:
  config:
    import: classpath:application.yml

  datasource:
    url: jdbc:postgresql://${AUTH_DB_HOST}:${AUTH_DB_PORT}/${AUTH_DB_NAME}
    username: ${AUTH_DB_USER}
    password: ${AUTH_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000

  sql:
    init:
      mode: NEVER
      encoding: UTF-8

  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc.time_zone: UTC
        default_schema: dbo
    show-sql: true
    open-in-view: false

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: dbo
    default-schema: dbo
    table: flyway_schema_history
    validate-on-migrate: true
    url: jdbc:postgresql://${BACKING_POSTGRES_HOST}:${BACKING_POSTGRES_PORT}/${DB_NAME}
    user: ${BACKING_POSTGRES_USER}
    password: ${BACKING_POSTGRES_PASSWORD}


  mail:
    host: smtp.gmail.com
    port: 465
    username: ${USERNAME_MAIL}
    password: ${USERNAME_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          ssl.enable: true
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    test-connection: false

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

logging:
  level:
    root: INFO
    com.kiosko.authservice: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/authservice.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true

jwt:
  issuer: AuthService
  secret-key: ${JWT_SECRET_KEY}
  expiration: 86400000
  access-token-expiration: 900000
  refresh-token-expiration: 86400000

app:
  name: AuthService
  version: 1.0.0
  base-url:
    dev: http://localhost:8081
    prod: https://api.plataforma.com
  admin:
    email: ales.domi.sela.1995@gmail.com
    default-password: Admin123!
  email:
    from: noreply@plataforma.com
    from-name: AuthService Platform
    enabled: true
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

security:
  password:
    min-length: 8
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special-char: true
  login:
    max-failed-attempts: 3
  token:
    verification-expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/