spring:
  config:
    import: classpath:application.yml
  datasource:
    url: jdbc:postgresql://${TENANT_DB_HOST}:${TENANT_DB_PORT}/${TENANT_DB_NAME}
    username: ${TENANT_DB_USER}
    password: ${TENANT_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: update
      default_schema: dbo
      show-sql: true
  
  services:
    users:
      base-url: http://localhost:8081/api/v1/users

  sql:
    init:
      mode: always
      encoding: UTF-8

server:
 port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/